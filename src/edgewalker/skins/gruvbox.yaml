metadata:
  name: "Gruvbox"
  author: "Pavel Pertsev"

theme:
  primary: "#85A598"
  secondary: "#A89A85"
  warning: "#fe8019"
  error: "#fb4934"
  success: "#b8bb26"
  accent: "#fabd2f"
  foreground: "#fbf1c7"
  background: "#282828"
