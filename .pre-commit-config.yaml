repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pycqa/isort
    rev: 8.0.1
    hooks:
      - id: isort
        name: isort (python)

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.10.0
          - pydantic-settings>=2.13.1
          - types-PyYAML>=6.0.12.20241230

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run task test-coverage
        language: system
        pass_filenames: false
        always_run: true

      - id: generate-telemetry-docs
        name: generate-telemetry-docs
        entry: uv run python scripts/generate_telemetry_docs.py
        language: system
        pass_filenames: false
        always_run: true
