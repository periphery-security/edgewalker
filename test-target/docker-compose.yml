services:
  target:
    build:
      context: .
      dockerfile: Dockerfile
    image: edgewalker-target
    container_name: edgewalker-target
    hostname: vulnerable-iot
    ports:
      - "21:21"
      - "22:22"
      - "23:23"
      - "445:445"
      - "80:80"
      - "443:443"
      - "3306:3306"
      - "5432:5432"
      - "6379:6379"
    restart: unless-stopped
